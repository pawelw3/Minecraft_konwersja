<rect x="100" y="320" width="1000" height="400" fill="#2d2d44" rx="10"/>
<text x="600" y="350" text-anchor="middle" fill="#ffffff" font-family="Consolas, monospace" font-size="16" font-weight="bold">SCHEMAT BLOKOWY UKŁADU</text>

<!-- Bloki -->
<rect x="150" y="400" width="120" height="80" fill="#4a4a6a" rx="10"/>
<text x="210" y="445" text-anchor="middle" fill="#ffffff" font-family="Consolas, monospace" font-size="14" font-weight="bold">ZEGAR</text>
<text x="210" y="465" text-anchor="middle" fill="#aaa" font-family="Consolas, monospace" font-size="10">1Hz (20 ticków)</text>

<rect x="350" y="400" width="140" height="80" fill="#4a4a6a" rx="10"/>
<text x="420" y="445" text-anchor="middle" fill="#ffffff" font-family="Consolas, monospace" font-size="14" font-weight="bold">LICZNIK</text>
<text x="420" y="465" text-anchor="middle" fill="#aaa" font-family="Consolas, monospace" font-size="10">4-bit (0-15)</text>

<rect x="570" y="400" width="140" height="80" fill="#4a4a6a" rx="10"/>
<text x="640" y="445" text-anchor="middle" fill="#ffffff" font-family="Consolas, monospace" font-size="14" font-weight="bold">DEKODER</text>
<text x="640" y="465" text-anchor="middle" fill="#aaa" font-family="Consolas, monospace" font-size="10">BCD → 10 linii</text>

<rect x="790" y="380" width="280" height="200" fill="#4a4a6a" rx="10"/>
<text x="930" y="410" text-anchor="middle" fill="#ffffff" font-family="Consolas, monospace" font-size="14" font-weight="bold">COMMAND BLOCKS</text>

<rect x="815" y="425" width="30" height="30" fill="#2d2d44" rx="3"/>
<text x="830" y="445" text-anchor="middle" fill="#ffffff" font-family="Consolas, monospace" font-size="10">0</text>

<rect x="865" y="425" width="30" height="30" fill="#2d2d44" rx="3"/>
