<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
<rect width="1200" height="800" fill="#1a1a2e"/>

<text x="600" y="50" text-anchor="middle" fill="#ffffff" font-family="Consolas, monospace" font-size="28" font-weight="bold">
    PEŁNY CYKL LICZNIKA 0-9 (10 sekund)
</text>

<!-- Oś czasu -->
<line x1="100" y1="150" x2="1100" y2="150" stroke="#ffffff" stroke-width="3"/>
<text x="100" y="130" fill="#ffffff" font-family="Consolas, monospace" font-size="14">t=0s</text>
<text x="1100" y="130" fill="#ffffff" font-family="Consolas, monospace" font-size="14">t=10s</text>

<!-- Cyfry na osi czasu -->

<line x1="150" y1="140" x2="150" y2="160" stroke="#ff3333" stroke-width="2"/>
<circle cx="150" cy="200" r="30" fill="#4a4a6a" stroke="#ff3333" stroke-width="2"/>
