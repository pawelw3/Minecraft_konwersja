<?xml version="1.0" encoding="UTF-8"?>
<svg width="1000" height="700" viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg">
<defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
        <feMerge>
            <feMergeNode in="coloredBlur"/>
            <feMergeNode in="SourceGraphic"/>
        </feMerge>
    </filter>
</defs>

<!-- Tło -->
<rect width="1000" height="700" fill="#1a1a2e"/>

<!-- Tytuł -->
<text x="500" y="40" text-anchor="middle" fill="#ffffff" font-family="Consolas, monospace" font-size="28" font-weight="bold">
    CYFROWY LICZNIK 4-BITOWY - STAN: 0
</text>


<!-- Sekcja Zegar -->
<rect x="60" y="80" width="140" height="100" fill="#2d2d44" rx="10"/>
<text x="130" y="100" text-anchor="middle" fill="#ffffff" font-family="Consolas, monospace" font-size="14" font-weight="bold">ZEGAR 1Hz</text>


<circle cx="130" cy="140" r="25" fill="#ff3333" filter="url(#glow)"/>
<text x="130" y="185" text-anchor="middle" fill="#ffffff" font-family="Consolas, monospace" font-size="12">PULS!</text>


